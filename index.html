<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main class="container">
      <article class="card">
        <img
          class="hero-img"
          src="images/illustration-hero.svg"
          alt="music-background-image"
        />
        <div class="bottom-content">
          <div class="card-info-section">
            <h1 class="h1">Order Summary</h1>
            <p>
              You can now listen to millions of songs, audiobooks, and podcasts
              on any device anywhere you like!
            </p>
          </div>
          <div class="card-plan-details">
            <div class="leftPlan">
              <img
                class="music-icon"
                src="images/icon-music.svg"
                alt="music-icon"
              />
              <div class="plan-price-detail">
                <p class="annual-plan">Annual Plan</p>
                <p class="price">$59.99/year</p>
              </div>
            </div>

            <div class="change-link">
              <a href="#">Change</a>
            </div>
          </div>
          <div class="buttons">
            <button class="payment-button">Proceed to Payment</button>
            <button class="cancel-order-button">Cancel Order</button>
          </div>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
